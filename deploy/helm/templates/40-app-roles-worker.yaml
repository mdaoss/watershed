---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name:  "firepaws-watershed"
rules:
- apiGroups: ["cilium.io"]
  resources:
      - ciliumegressgatewaypolicies
      - ciliumidentities
      - ciliumnodes
      - ciliumendpoints
  verbs: ["get", "list", "watch"]

- apiGroups: [""]
  resources:
  - nodes
  - namespaces
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name:  "firepaws-watershed"
subjects:
- kind: ServiceAccount
  name:  "firepaws-watershed"
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: "firepaws-watershed"
  apiGroup: rbac.authorization.k8s.io
